      '3-5 강서진','3-5 고은찬','3-5 김도연','3-5 김민지','3-5 김서우','3-5 김예준','3-5 김주아','3-5 김태민','3-5 노서윤','3-5 문서준','3-5 박건하','3-5 박서준','3-5 박유나','3-5 박지성','3-5 배주원','3-5 백하린','3-5 서준혁','3-5 성민우','3-5 송다은','3-5 신가은','3-5 안지후','3-5 양예은','3-5 오채린','3-5 유민재','3-5 윤도현','3-5 이가은','3-5 이도현','3-5 이수민','3-5 이지안',
      '3-6 강민지','3-6 고윤서','3-6 김도윤','3-6 김서진','3-6 김수현','3-6 김예린','3-6 김준영','3-6 남서현','3-6 박도현','3-6 박서윤','3-6 박지후','3-6 배수민','3-6 백민준','3-6 서지우','3-6 손예린','3-6 송민준','3-6 신도윤','3-6 안유진','3-6 양서윤','3-6 오민재','3-6 유서진','3-6 윤지후','3-6 이서윤','3-6 이지후','3-6 임서준','3-6 정하린','3-6 조민서','3-6 최가은','3-6 최우진','3-6 최유정','3-6 최종윤','3-6 최지우'
    ];

    const seedIncidents = [
      {
        datetime: '2026-03-23T10:20',
        places: ['교실', '복도'],
        types: ['수업방해', '교우갈등'],
        students: ['3-1 강다원', '3-1 강민석', '3-2 강민재'],
        severity: '보통',
        status: '진행중',
        description: '3교시 전후 학생 간 언쟁이 있었고, 수업 시작 후에도 자리 이동 및 큰 소리 대화가 이어져 학습 분위기를 저해함.',
        followUp: '담임교사와 3학년 수업교사가 각각 면담 실시. 다음날 상담교사 연계 예정.'
      }
    ];

    const placeOptions = ['교실', '복도', '운동장', '급식실', '특별실', '상담실', '보건실', '교무실', '교외', '기타'];
    const typeOptions = ['수업방해', '교우갈등', '언어폭력', '신체충돌', '무단이탈/지각', '생활규정위반', '정서/상담', '전자기기사용', '기타'];
    const severityOptions = ['낮음', '보통', '높음'];
    const statusOptions = ['진행중', '조치완료', '추적관찰'];

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function StatCard({ title, value, hint }) {
      return React.createElement(
        'div',
        { className: 'card p-5' },
        React.createElement('div', { className: 'text-sm text-slate-500' }, title),
        React.createElement('div', { className: 'mt-2 text-3xl font-bold text-slate-900' }, String(value)),
        hint ? React.createElement('div', { className: 'mt-2 text-xs text-slate-500' }, hint) : null
      );
    }

    function Pill({ children, tone = 'slate' }) {
      return React.createElement('span', { className: `pill pill-${tone}` }, children);
    }

    function CheckboxGrid({ title, options, selected, onToggle }) {
      return React.createElement(
        'div',
        null,
        React.createElement('div', { className: 'mb-3 text-sm font-semibold text-slate-700' }, title),
        React.createElement(
          'div',
          { className: 'grid grid-cols-2 gap-3 md:grid-cols-3 xl:grid-cols-4' },
          ...options.map((opt) =>
            React.createElement(
              'label',
              { key: opt, className: 'flex cursor-pointer items-center gap-2 rounded-2xl border border-slate-200 px-3 py-3 hover:bg-slate-50' },
              React.createElement('input', {
                type: 'checkbox',
                checked: selected.includes(opt),
                onChange: () => onToggle(opt),
                className: 'h-4 w-4'
              }),
              React.createElement('span', { className: 'text-sm text-slate-700' }, opt)
            )
          )
        )
      );
    }

    function formatDate(value) {
      return (value || '').replace('T', ' ');
    }

    function monthKey(value) {
      return (value || '').slice(0, 7);
    }

    function App() {
      const [authUser, setAuthUser] = useState(null);
      const [loading, setLoading] = useState(true);

      const [isAuthorized, setIsAuthorized] = useState(sessionStorage.getItem('school_authorized') === 'true');
      const [inputCode, setInputCode] = useState('');
      const [selectedTeacher, setSelectedTeacher] = useState(sessionStorage.getItem('school_teacher') || '');
      const [currentUser, setCurrentUser] = useState(sessionStorage.getItem('school_teacher') || teacherAccounts[0].name);

      const [view, setView] = useState('dashboard');
      const [queryText, setQueryText] = useState('');
      const [studentQuery, setStudentQuery] = useState('');
      const [selectedStudents, setSelectedStudents] = useState([]);
      const [places, setPlaces] = useState([]);
      const [types, setTypes] = useState([]);
      const [editingId, setEditingId] = useState(null);
      const [notice, setNotice] = useState('');
      const [form, setForm] = useState({
        datetime: '',
        severity: '보통',
        status: '진행중',
        description: '',
        followUp: '',
        note: ''
      });

      const role = teacherAccounts.find((t) => t.name === currentUser)?.role || '';

      const [incidents, setIncidents] = useState([]);

      useEffect(() => {
        return onAuthStateChanged(auth, (user) => {
          setAuthUser(user);
          setLoading(false);
        });
      }, []);

      useEffect(() => {
        if (!authUser) return;
        const q = query(collection(db, 'incidents'), orderBy('datetime', 'desc'));
        const unsub = onSnapshot(q, (snapshot) => {
          setIncidents(snapshot.docs.map((d) => ({ id: d.id, ...d.data() })));
        });
        return () => unsub();
      }, [authUser]);

      useEffect(() => {
        if (!notice) return;
        const t = setTimeout(() => setNotice(''), 1800);
        return () => clearTimeout(t);
      }, [notice]);

      const filteredRoster = useMemo(() => {
        if (!studentQuery.trim()) return rosterSeed;
        return rosterSeed.filter((student) => student.toLowerCase().includes(studentQuery.toLowerCase()));
      }, [studentQuery]);

      const filteredIncidents = useMemo(() => {
        if (!queryText.trim()) return incidents;
        const q = queryText.toLowerCase();
        return incidents.filter((item) =>
          [
            item.id,
            item.datetime,
            item.severity,
            item.status,
            item.description,
            item.followUp,
            item.note || '',
            ...(item.places || []),
            ...(item.types || []),
            ...(item.students || []),
            ...(item.writers || [])
          ]
            .join(' ')
            .toLowerCase()
            .includes(q)
        );
      }, [incidents, queryText]);

      const countsByStudent = useMemo(() => {
        const map = {};
        incidents.forEach((incident) => {
          (incident.students || []).forEach((student) => {
            map[student] = (map[student] || 0) + 1;
          });
        });
        return Object.entries(map).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
      }, [incidents]);

      const countsByType = useMemo(() => {
        const map = {};
        typeOptions.forEach((t) => (map[t] = 0));
        incidents.forEach((incident) => {
          (incident.types || []).forEach((t) => {
            map[t] = (map[t] || 0) + 1;
          });
        });
        return Object.entries(map).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
      }, [incidents]);

      const countsByPlace = useMemo(() => {
        const map = {};
        placeOptions.forEach((p) => (map[p] = 0));
        incidents.forEach((incident) => {
          (incident.places || []).forEach((p) => {
            map[p] = (map[p] || 0) + 1;
          });
        });
        return Object.entries(map).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
      }, [incidents]);

      const monthCounts = useMemo(() => {
        const map = {};
        incidents.forEach((incident) => {
          const key = monthKey(incident.datetime);
          map[key] = (map[key] || 0) + 1;
        });
        return Object.entries(map).map(([month, count]) => ({ month, count })).sort((a, b) => a.month.localeCompare(b.month));
      }, [incidents]);

      const totalCount = incidents.length;
      const inProgressCount = incidents.filter((i) => i.status === '진행중').length;
      const highCount = incidents.filter((i) => i.severity === '높음').length;
      const repeatedStudents = countsByStudent.filter((s) => s.count >= 2).length;

      const thisMonth = new Date().toISOString().slice(0, 7);
      const lastMonthDate = new Date();
      lastMonthDate.setMonth(lastMonthDate.getMonth() - 1);
      const lastMonth = lastMonthDate.toISOString().slice(0, 7);

      const thisMonthCount = incidents.filter((i) => monthKey(i.datetime) === thisMonth).length;
      const lastMonthCount = incidents.filter((i) => monthKey(i.datetime) === lastMonth).length;

      const today = new Date();
      const recent7Start = new Date(today);
      recent7Start.setDate(today.getDate() - 7);

      const prev7Start = new Date(today);
      prev7Start.setDate(today.getDate() - 14);

      function toDateTime(str) {
        return new Date(str);
      }

      const recent7Count = incidents.filter((i) => {
        const d = toDateTime(i.datetime);
        return d >= recent7Start && d <= today;
      }).length;

      const prev7Count = incidents.filter((i) => {
        const d = toDateTime(i.datetime);
        return d >= prev7Start && d < recent7Start;
      }).length;

      function trendText(current, previous) {
        if (previous === 0 && current === 0) return '변화 없음';
        if (previous === 0 && current > 0) return `▲ ${current}건 증가`;
        const diff = current - previous;
        if (diff === 0) return '변화 없음';
        return diff > 0 ? `▲ ${diff}건 증가` : `▼ ${Math.abs(diff)}건 감소`;
      }

      const toggleListValue = (value, list, setter) => {
        setter(list.includes(value) ? list.filter((v) => v !== value) : [...list, value]);
      };

      const resetForm = () => {
        setForm({
          datetime: '',
          severity: '보통',
          status: '진행중',
          description: '',
          followUp: '',
          note: ''
        });
        setSelectedStudents([]);
        setPlaces([]);
        setTypes([]);
        setStudentQuery('');
        setEditingId(null);
      };

      const startEdit = (incident) => {
        setEditingId(incident.id);
        setForm({
          datetime: incident.datetime || '',
          severity: incident.severity || '보통',
          status: incident.status || '진행중',
          description: incident.description || '',
          followUp: incident.followUp || '',
          note: incident.note || ''
        });
        setSelectedStudents(incident.students || []);
        setPlaces(incident.places || []);
        setTypes(incident.types || []);
        setView('create');
        setNotice('사안을 수정 모드로 불러왔어요.');
      };

      async function handleEnter() {
        if (inputCode !== SCHOOL_CODE) {
          alert('학교 코드가 올바르지 않습니다.');
          return;
        }
        if (!selectedTeacher) {
          alert('교사를 선택해주세요.');
          return;
        }
        try {
          if (!auth.currentUser) {
            await signInAnonymously(auth);
          }
          setCurrentUser(selectedTeacher);
          setIsAuthorized(true);
          sessionStorage.setItem('school_authorized', 'true');
          sessionStorage.setItem('school_teacher', selectedTeacher);
        } catch (e) {
          console.error(e);
          alert('입장 처리 중 오류가 발생했습니다.');
        }
      }

      async function handleExit() {
        sessionStorage.removeItem('school_authorized');
        sessionStorage.removeItem('school_teacher');
        setIsAuthorized(false);
        setInputCode('');
        setSelectedTeacher('');
        try {
          await signOut(auth);
        } catch (e) {
          console.error(e);
        }
      }

      async function saveIncident() {
        if (!form.datetime || !places.length || !types.length || !selectedStudents.length || !form.description.trim() || !form.followUp.trim()) {
          setNotice('필수 항목을 먼저 입력해줘.');
          return;
        }

        const payload = {
          datetime: form.datetime,
          places,
          types,
          students: selectedStudents,
          severity: form.severity,
          status: form.status,
          description: form.description,
          followUp: form.followUp,
          note: form.note,
          writers: editingId
            ? Array.from(new Set([...(incidents.find((x) => x.id === editingId)?.writers || []), currentUser]))
            : [currentUser],
          updatedAtText: new Date().toLocaleString('sv-SE').slice(0, 16).replace('T', ' '),
          updatedAt: serverTimestamp()
        };

        if (editingId) {
          await updateDoc(doc(db, 'incidents', editingId), payload);
          setNotice('사안을 수정했어.');
        } else {
          await addDoc(collection(db, 'incidents'), {
            ...payload,
            createdAt: serverTimestamp()
          });
          setNotice('사안을 등록했어.');
        }

        resetForm();
        setView('incidents');
      }

      async function deleteIncident(incidentId) {
        const ok = window.confirm('이 사안을 정말 삭제할까? 삭제 후 복구가 어려울 수 있어.');
        if (!ok) return;
        await deleteDoc(doc(db, 'incidents', incidentId));
        if (editingId === incidentId) resetForm();
        setNotice('사안을 삭제했어.');
      }

      async function seedDemoData() {
        const snap = await getDocs(query(collection(db, 'incidents'), limit(1)));
        if (!snap.empty) {
          setNotice('이미 데이터가 있어서 예시 사안을 추가하지 않았어.');
          return;
        }
        for (const row of seedIncidents) {
          await addDoc(collection(db, 'incidents'), {
            ...row,
            writers: [currentUser],
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
            updatedAtText: new Date().toLocaleString('sv-SE').slice(0, 16).replace('T', ' ')
          });
        }
        setNotice('예시 사안을 추가했어.');
      }

      if (loading) {
        return React.createElement('div', { className: 'min-h-screen flex items-center justify-center text-slate-600' }, '불러오는 중...');
      }

      if (!isAuthorized) {
        return React.createElement(
          'div',
          { className: 'min-h-screen flex items-center justify-center bg-slate-100 p-6' },
