    function roleForUser(user) {
      if (!user) return null;
      const email = (user.email || '').toLowerCase();
      const displayName = user.displayName || '';
      return teacherAccounts.find((t) =>
        (t.email && t.email.toLowerCase() === email) || (!t.email && t.name === displayName)
      ) || null;
    }

    function StatCard({ title, value, hint }) {
      return React.createElement('div', { className: 'card p-5' },
        React.createElement('div', { className: 'text-sm text-slate-500' }, title),
        React.createElement('div', { className: 'mt-2 text-3xl font-bold text-slate-900' }, value),
        hint ? React.createElement('div', { className: 'mt-2 text-xs text-slate-500' }, hint) : null
      );
    }

    function Pill({ children, tone = 'slate' }) {
      return React.createElement('span', { className: `pill pill-${tone}` }, children);
    }

    function CheckboxGrid({ title, options, selected, onToggle }) {
      return React.createElement('div', null,
        React.createElement('div', { className: 'mb-3 text-sm font-semibold text-slate-700' }, title),
        React.createElement('div', { className: 'grid grid-cols-2 gap-3 md:grid-cols-3 xl:grid-cols-4' },
          ...options.map((opt) =>
            React.createElement('label', { key: opt, className: 'flex cursor-pointer items-center gap-2 rounded-2xl border border-slate-200 px-3 py-3 hover:bg-slate-50' },
              React.createElement('input', {
                type: 'checkbox',
                checked: selected.includes(opt),
                onChange: () => onToggle(opt),
                className: 'h-4 w-4'
              }),
              React.createElement('span', { className: 'text-sm text-slate-700' }, opt)
            )
          )
        )
      );
    }

    function App() {
      const [view, setView] = useState('dashboard');
      const [authUser, setAuthUser] = useState(null);
      const [allowedTeacher, setAllowedTeacher] = useState(null);
      const [incidents, setIncidents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [queryText, setQueryText] = useState('');
      const [studentQuery, setStudentQuery] = useState('');
      const [selectedStudents, setSelectedStudents] = useState([]);
      const [places, setPlaces] = useState([]);
      const [types, setTypes] = useState([]);
      const [editingId, setEditingId] = useState(null);
      const [notice, setNotice] = useState('');

      const [form, setForm] = useState({
        datetime: '',
        severity: '보통',
        status: '진행중',
        description: '',
        followUp: '',
        note: '',
      });

      useEffect(() => {
        return onAuthStateChanged(auth, async (user) => {
          setAuthUser(user);
          const matched = roleForUser(user);
          setAllowedTeacher(matched || null);
          setLoading(false);
        });
      }, []);

      useEffect(() => {
        if (!allowedTeacher) return;
        const q = query(collection(db, 'incidents'), orderBy('datetime', 'desc'));
        const unsub = onSnapshot(q, (snapshot) => {
          const rows = snapshot.docs.map((d) => ({ id: d.id, ...d.data() }));
          setIncidents(rows);
        });
        return () => unsub();
      }, [allowedTeacher]);

      useEffect(() => {
        if (!notice) return;
        const t = setTimeout(() => setNotice(''), 1800);
        return () => clearTimeout(t);
      }, [notice]);

      const filteredRoster = useMemo(() => {
        if (!studentQuery.trim()) return rosterSeed;
        return rosterSeed.filter((student) => student.toLowerCase().includes(studentQuery.toLowerCase()));
      }, [studentQuery]);

      const filteredIncidents = useMemo(() => {
        if (!queryText.trim()) return incidents;
        const q = queryText.toLowerCase();
        return incidents.filter((item) =>
          [
            item.id, item.datetime, item.severity, item.status, item.description, item.followUp, item.note || '',
            ...(item.places || []), ...(item.types || []), ...(item.students || []), ...(item.writers || []),
          ].join(' ').toLowerCase().includes(q)
        );
      }, [incidents, queryText]);

      const countsByStudent = useMemo(() => {
        const map = {};
        incidents.forEach((incident) => {
          (incident.students || []).forEach((student) => {
            map[student] = (map[student] || 0) + 1;
          });
        });
        return Object.entries(map).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
      }, [incidents]);

      const countsByType = useMemo(() => {
        const map = {};
        typeOptions.forEach((t) => (map[t] = 0));
        incidents.forEach((incident) => (incident.types || []).forEach((t) => (map[t] = (map[t] || 0) + 1)));
        return Object.entries(map).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count);
      }, [incidents]);

      const totalCount = incidents.length;
      const inProgressCount = incidents.filter((i) => i.status === '진행중').length;
      const highCount = incidents.filter((i) => i.severity === '높음').length;
      const repeatedStudents = countsByStudent.filter((s) => s.count >= 2).length;

      const toggleListValue = (value, list, setter) => {
        setter(list.includes(value) ? list.filter((v) => v !== value) : [...list, value]);
      };

      const resetForm = () => {
        setForm({ datetime: '', severity: '보통', status: '진행중', description: '', followUp: '', note: '' });
        setSelectedStudents([]);
        setPlaces([]);
        setTypes([]);
        setStudentQuery('');
        setEditingId(null);
      };

      const startEdit = (incident) => {
        setEditingId(incident.id);
        setForm({
          datetime: incident.datetime || '',
          severity: incident.severity || '보통',
          status: incident.status || '진행중',
          description: incident.description || '',
          followUp: incident.followUp || '',
          note: incident.note || '',
        });
        setSelectedStudents(incident.students || []);
        setPlaces(incident.places || []);
        setTypes(incident.types || []);
        setView('create');
        setNotice('사안을 수정 모드로 불러왔어요.');
      };

      async function signIn() {
        try {
          await signInWithPopup(auth, provider);
        } catch (e) {
          setNotice('로그인에 실패했어.');
        }
      }

      async function logOut() {
        await signOut(auth);
        setAllowedTeacher(null);
      }

      async function saveIncident() {
        if (!form.datetime || !places.length || !types.length || !selectedStudents.length || !form.description.trim() || !form.followUp.trim()) {
          setNotice('필수 항목을 먼저 입력해줘.');
          return;
        }
        const payload = {
          datetime: form.datetime,
          places,
          types,
          students: selectedStudents,
          severity: form.severity,
          status: form.status,
          description: form.description,
          followUp: form.followUp,
          note: form.note,
          writers: editingId
            ? Array.from(new Set([...(incidents.find((x) => x.id === editingId)?.writers || []), allowedTeacher.name]))
            : [allowedTeacher.name],
          updatedAtText: new Date().toLocaleString('sv-SE').slice(0, 16).replace('T', ' '),
          updatedAt: serverTimestamp(),
        };

        if (editingId) {
          await updateDoc(doc(db, 'incidents', editingId), payload);
          setNotice('사안을 수정했어.');
        } else {
          await addDoc(collection(db, 'incidents'), {
            ...payload,
            createdAt: serverTimestamp(),
          });
          setNotice('사안을 등록했어.');
        }
        resetForm();
        setView('incidents');
      }

      async function deleteIncident(incidentId) {
        const ok = window.confirm('이 사안을 정말 삭제할까? 삭제 후 복구가 어려울 수 있어.');
        if (!ok) return;
        await deleteDoc(doc(db, 'incidents', incidentId));
        if (editingId === incidentId) resetForm();
        setNotice('사안을 삭제했어.');
      }

      async function seedDemoData() {
        const snap = await getDocs(query(collection(db, 'incidents'), limit(1)));
        if (!snap.empty) {
          setNotice('이미 데이터가 있어서 예시 사안을 추가하지 않았어.');
          return;
        }
        for (const row of seedIncidents) {
          await addDoc(collection(db, 'incidents'), {
            ...row,
            writers: [allowedTeacher.name],
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp(),
            updatedAtText: new Date().toLocaleString('sv-SE').slice(0, 16).replace('T', ' '),
          });
        }
        setNotice('예시 사안을 추가했어.');
      }

        return React.createElement('div', { className: 'min-h-screen flex items-center justify-center text-slate-600' }, '불러오는 중...');

            React.createElement(StatCard, { title: '높음 심각도', value: highCount, hint: '교감/학생부 우선 확인' }),
            React.createElement(StatCard, { title: '반복 등장 학생', value: repeatedStudents, hint: '2회 이상 연루 학생' })

          React.createElement('div', { className: 'mb-6 flex flex-wrap gap-2' },
            ...[['dashboard','대시보드'], ['incidents','사안 목록'], ['create', editingId ? '사안 수정' : '사안 등록']].map(([key,label]) =>
              React.createElement('button', {
                key, onClick: () => setView(key),
                className: `rounded-2xl px-4 py-3 text-sm font-medium ${view === key ? 'bg-slate-900 text-white' : 'bg-white text-slate-700 shadow-sm'}`

              React.createElement('div', { className: 'space-y-3' },
                ...countsByStudent.slice(0, 8).map((student) =>
                  React.createElement('div', { key: student.name, className: 'flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3' },
                    React.createElement('div', { className: 'text-sm font-medium text-slate-700' }, student.name),
                    React.createElement(Pill, { tone: student.count >= 3 ? 'red' : student.count >= 2 ? 'amber' : 'blue' }, `${student.count}건`)

              )
            ),
            React.createElement('div', { className: cardStyle + ' p-5' },
              React.createElement('div', { className: 'mb-4 text-lg font-semibold' }, '사안 유형별 통계'),
              React.createElement('div', { className: 'space-y-3' },
                ...countsByType.map((type) =>

                      React.createElement('span', null, type.name),
                      React.createElement('span', { className: 'font-semibold' }, type.count)

                    React.createElement('div', { className: 'h-3 rounded-full bg-slate-100' },

            )

          view === 'incidents' ? React.createElement('div', { className: 'space-y-4' },
            React.createElement('div', { className: cardStyle + ' p-4' },
              React.createElement('div', { className: 'flex flex-col gap-3 md:flex-row md:items-center md:justify-between' },
                React.createElement('input', {
                  value: queryText,
                  onChange: (e) => setQueryText(e.target.value),
                  placeholder: '학생명, 장소, 유형, 상태, 내용으로 검색',
                  className: 'w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none md:max-w-md'
                }),
                React.createElement('button', { onClick: () => setView('create'), className: 'rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white' }, '새 사안 등록')
              )
            ),
            ...filteredIncidents.map((item) => {
              const repeatedInThisIncident = (item.students || []).filter((student) => (countsByStudent.find((s) => s.name === student)?.count || 0) >= 2);
              return React.createElement('div', { key: item.id, className: cardStyle + ' p-5' },
                React.createElement('div', { className: 'flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between' },
                  React.createElement('div', { className: 'flex-1' },
                    React.createElement('div', { className: 'flex flex-wrap items-center gap-2' },
                      React.createElement(Pill, null, item.id),
                      React.createElement(Pill, { tone: item.severity === '높음' ? 'red' : item.severity === '보통' ? 'amber' : 'green' }, item.severity),
                      React.createElement(Pill, { tone: 'blue' }, item.status),
                      React.createElement('span', { className: 'text-sm text-slate-500' }, (item.datetime || '').replace('T',' '))
                    ),
                    React.createElement('div', { className: 'mt-3 flex flex-wrap gap-2' },
                      ...(item.places || []).map((place) => React.createElement(Pill, { key: place, tone: 'slate' }, `📍 ${place}`)),
                      ...(item.types || []).map((type) => React.createElement(Pill, { key: type, tone: 'blue' }, `🏷 ${type}`))
                    ),
                    React.createElement('div', { className: 'mt-4' },
                      React.createElement('div', { className: 'mb-2 text-sm font-semibold text-slate-700' }, '관련 학생'),
                      React.createElement('div', { className: 'flex flex-wrap gap-2' },
                        ...(item.students || []).map((student) => {

                          return React.createElement(Pill, { key: student, tone: count >= 3 ? 'red' : count >= 2 ? 'amber' : 'slate' }, student);
                        })
                      ),
                      repeatedInThisIncident.length > 0 ? React.createElement('div', { className: 'mt-2 text-xs text-red-600' }, `반복 등장 학생: ${repeatedInThisIncident.join(', ')}`) : null
                    )
                  ),
                  React.createElement('div', { className: 'flex gap-2' },
                    React.createElement('button', { onClick: () => startEdit(item), className: 'rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white' }, '수정'),
                    React.createElement('button', { onClick: () => deleteIncident(item.id), className: 'rounded-2xl bg-red-600 px-4 py-3 text-sm font-medium text-white' }, '삭제')
                  )
                ),
                React.createElement('div', { className: 'mt-4 grid gap-4 lg:grid-cols-2' },
                  React.createElement('div', { className: 'rounded-2xl bg-slate-50 p-4' },
                    React.createElement('div', { className: 'mb-2 text-sm font-semibold text-slate-700' }, '구체적 상황'),
                    React.createElement('div', { className: 'whitespace-pre-wrap text-sm leading-7 text-slate-600' }, item.description || '')
                  ),
                  React.createElement('div', { className: 'rounded-2xl bg-slate-50 p-4' },
                    React.createElement('div', { className: 'mb-2 text-sm font-semibold text-slate-700' }, '후속조치'),
                    React.createElement('div', { className: 'whitespace-pre-wrap text-sm leading-7 text-slate-600' }, item.followUp || '')
                  )

                React.createElement('div', { className: 'mt-4 flex flex-wrap items-center gap-3 text-xs text-slate-500' },
                  React.createElement('span', null, `작성/추가 교사: ${(item.writers || []).join(', ')}`),
                  React.createElement('span', null, `최근 수정일: ${item.updatedAtText || ''}`)
                )
              );

          view === 'create' ? React.createElement('div', { className: cardStyle + ' p-5 md:p-6' },
            React.createElement('div', { className: 'mb-5 text-xl font-bold' }, editingId ? '사안 수정' : '사안 등록'),
            React.createElement('div', { className: 'grid gap-4 md:grid-cols-3' },
              React.createElement('div', null,
                React.createElement('div', { className: 'mb-2 text-sm font-semibold text-slate-700' }, '사안발생일시'),
                React.createElement('input', { type: 'datetime-local', value: form.datetime, onChange: (e) => setForm({ ...form, datetime: e.target.value }), className: 'w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none' })
              ),
              React.createElement('div', null,
                React.createElement('div', { className: 'mb-2 text-sm font-semibold text-slate-700' }, '심각도'),
                React.createElement('select', { value: form.severity, onChange: (e) => setForm({ ...form, severity: e.target.value }), className: 'w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none' },
                  ...severityOptions.map((option) => React.createElement('option', { key: option }, option))
                )
              ),
              React.createElement('div', null,
                React.createElement('div', { className: 'mb-2 text-sm font-semibold text-slate-700' }, '사안 상태'),
                React.createElement('select', { value: form.status, onChange: (e) => setForm({ ...form, status: e.target.value }), className: 'w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none' },
                  ...statusOptions.map((option) => React.createElement('option', { key: option }, option))
                )
              )
            ),
            React.createElement('div', { className: 'mt-6 grid gap-6 xl:grid-cols-2' },
              React.createElement(CheckboxGrid, { title: '사안발생장소 · 복수 선택', options: placeOptions, selected: places, onToggle: (v) => toggleListValue(v, places, setPlaces) }),
              React.createElement(CheckboxGrid, { title: '사안유형 · 복수 선택', options: typeOptions, selected: types, onToggle: (v) => toggleListValue(v, types, setTypes) })
            ),
            React.createElement('div', { className: 'mt-6' },
              React.createElement('div', { className: 'mb-2 flex items-center justify-between' },
                React.createElement('div', { className: 'text-sm font-semibold text-slate-700' }, '관련 학생 · 검색 후 여러 명 선택'),
                React.createElement(Pill, { tone: 'blue' }, `${selectedStudents.length}명 선택`)
              ),
              React.createElement('input', { value: studentQuery, onChange: (e) => setStudentQuery(e.target.value), placeholder: '학생명 검색', className: 'mb-3 w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none md:max-w-md' }),
              React.createElement('div', { className: 'max-h-64 overflow-auto rounded-2xl border border-slate-200 bg-slate-50 p-3' },
                React.createElement('div', { className: 'grid gap-2 md:grid-cols-2 xl:grid-cols-3' },
                  ...filteredRoster.map((student) =>
                    React.createElement('label', { key: student, className: 'flex cursor-pointer items-center gap-2 rounded-2xl border border-slate-200 bg-white px-3 py-3 hover:bg-slate-50' },
                      React.createElement('input', { type: 'checkbox', checked: selectedStudents.includes(student), onChange: () => toggleListValue(student, selectedStudents, setSelectedStudents) }),
                      React.createElement('span', { className: 'text-sm text-slate-700' }, student)
                    )
                  )
                )
              )
            ),
            React.createElement('div', { className: 'mt-6 grid gap-6 lg:grid-cols-2' },
              React.createElement('div', null,
                React.createElement('div', { className: 'mb-2 text-sm font-semibold text-slate-700' }, '구체적 상황 · 공동 작성'),
                React.createElement('textarea', { value: form.description, onChange: (e) => setForm({ ...form, description: e.target.value }), className: 'min-h-[220px] w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none' })
              ),
              React.createElement('div', null,
                React.createElement('div', { className: 'mb-2 text-sm font-semibold text-slate-700' }, '후속조치 · 공동 작성'),
                React.createElement('textarea', { value: form.followUp, onChange: (e) => setForm({ ...form, followUp: e.target.value }), className: 'min-h-[220px] w-full rounded-2xl border border-slate-200 px-4 py-3 outline-none' })
              )

            React.createElement('div', { className: 'mt-6 flex justify-end gap-2' },
              React.createElement('button', { onClick: resetForm, className: 'rounded-2xl bg-slate-200 px-5 py-3 text-sm font-medium text-slate-700' }, '초기화'),
              React.createElement('button', { onClick: saveIncident, className: 'rounded-2xl bg-slate-900 px-5 py-3 text-sm font-medium text-white' }, editingId ? '수정 저장' : '사안 등록')
            )
          ) : null
        )
      );
    }

    createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
